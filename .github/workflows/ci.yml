name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd src/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          JWT_SECRET: test-secret-key
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123
          MILVUS_ENABLED: "false"
        run: |
          cd src/backend
          python -m pytest ../../tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=40

  frontend-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: cd src/frontend && npm ci

      - name: Type check (Core)
        run: cd src/frontend && npx tsc -p tsconfig.core.json --noEmit

      - name: Lint
        run: cd src/frontend && npm run lint

      - name: Build (Core)
        run: cd src/frontend && VITE_MCHAT_EDITION=core npm run build:core

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: false
          tags: mchat-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          push: false
          tags: mchat-frontend:latest

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mchat_test
          MYSQL_DATABASE: mchat_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd src/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests
        env:
          DATABASE_URL: mysql+aiomysql://root:mchat_test@127.0.0.1:3306/mchat_test
          JWT_SECRET: test-secret-key
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin123
          MILVUS_ENABLED: "false"
        run: |
          cd src/backend
          python -m pytest ../../tests/ -v --cov=app --cov-report=term-missing

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: cd src/frontend && npm ci

      - name: Type check
        run: cd src/frontend && npx tsc --noEmit

      - name: Lint
        run: cd src/frontend && npm run lint

      - name: Build
        run: cd src/frontend && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: src/backend
          push: false
          tags: mchat-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          push: false
          tags: mchat-frontend:latest

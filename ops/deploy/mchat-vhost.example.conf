# Copy to ops/deploy/mchat.<your-domain>.conf (gitignored), then install on the server:
#   sudo cp ... /etc/nginx/sites-available/ && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name mchat.example.com www.mchat.example.com;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:5180;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

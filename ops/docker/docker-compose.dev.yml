services:
  # 仅 MySQL（开发时 Milvus/Redis 可选）
  mysql:
    image: mysql:8.0
    container_name: mchat-dev-mysql
    environment:
      MYSQL_ROOT_PASSWORD: dev_password
      MYSQL_DATABASE: mchat_dev
      MYSQL_USER: mchat
      MYSQL_PASSWORD: mchat_dev
    ports:
      - "3306:3306"
    volumes:
      - dev_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdev_password"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dev_mysql_data:
    driver: local

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: mchat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mchat-network
    restart: unless-stopped

  # Redis（可选，跨实例 WebSocket 广播）
  redis:
    image: redis:7-alpine
    container_name: mchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mchat-network
    restart: unless-stopped

  # Milvus 向量数据库（可选，知识库功能需要）
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: mchat-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "${MILVUS_PORT:-19530}:19530"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    networks:
      - mchat-network
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: mchat-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379
    ports:
      - "2379:2379"
    networks:
      - mchat-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: mchat-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mchat-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ../../src/backend
      dockerfile: Dockerfile
    container_name: mchat-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      REDIS_URL: "redis://redis:6379"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3001"
    ports:
      - "${BACKEND_PORT}:3001"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mchat-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ../../src/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:3001}"
    container_name: mchat-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - mchat-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  milvus_data:
    driver: local
  etcd_data:
    driver: local
  minio_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  mchat-network:
    driver: bridge
